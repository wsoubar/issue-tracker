spring:
  application:
    name: issue-tracker

  datasource:
    # Grava os dados na pasta ./data/h2db na raiz do seu projeto
    url: jdbc:h2:file:./data/h2db/issuetracker;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: 123456

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      # Garante que o Spring vai rodar nosso script de criação de tabelas
      mode: always